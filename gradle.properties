# ---- PvPGames Demo Core: build properties ----
# Pinned versions (verified current as of May 2026). Bump these in one place.

group=gg.pvpgames.demo
version=1.0.0

# Paper API target (Minecraft 1.21.x). Java 21 toolchain.
paperApiVersion=1.21.8-R0.1-SNAPSHOT

# Soft-dependency API versions used at compile time (provided scope).
placeholderApiVersion=2.11.7
luckpermsApiVersion=5.4
citizensApiVersion=2.0.39-SNAPSHOT

# Runtime libraries that get shaded/loaded.
hikariCpVersion=5.1.0
mysqlConnectorVersion=8.4.0
sqliteJdbcVersion=3.46.1.0

# Gradle daemon niceties
org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
