name: Build

# Builds the plugin jar on every push and pull request so the repo always shows
# whether the latest commit compiles. The resulting jar is uploaded as a downloadable
# artifact on each run.

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch: {}   # lets you trigger a build manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        # Provides Gradle and caches dependencies between runs. Also generates the
        # wrapper if it isn't committed, so CI works even without gradle-wrapper.jar.
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: gradle build --no-daemon

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: PvPGamesDemoCore
          path: build/libs/*.jar
          if-no-files-found: error
